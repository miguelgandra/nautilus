<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 662" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5a7c93"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="884" height="646" rx="14" fill="#f6f9fb" stroke="#d7e2ea" stroke-width="1.5"/>
  <text x="450" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#1f3a4a">The nautilus workflow</text>

  <!-- input -->
  <rect x="250" y="50" width="400" height="52" rx="9" fill="#dbe7f0" stroke="#7d9bb2" stroke-width="1.5"/>
  <text x="450" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#22333f">Raw tag data</text>
  <text x="450" y="90" text-anchor="middle" font-size="11" fill="#4a5c68">sensor CSVs  .  deployment metadata  .  (camera video)</text>
  <line x1="450" y1="102" x2="450" y2="122" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- spine band 1 -->
  <rect x="70" y="124" width="760" height="60" rx="8" fill="#ffffff" stroke="#9db8c9" stroke-width="1.5"/>
  <text x="90" y="147" font-size="11" font-weight="700" letter-spacing="1.2" fill="#2c6b8f">1 &#183; PREPARE &amp; IMPORT</text>
  <text x="90" y="169" font-size="11.5" font-family="'SF Mono', Menlo, Consolas, monospace" fill="#2b3d49">qcDeploymentMetadata()  -&gt;  importTagData()</text>
  <line x1="450" y1="184" x2="450" y2="200" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- spine band 2 -->
  <rect x="70" y="202" width="760" height="60" rx="8" fill="#ffffff" stroke="#9db8c9" stroke-width="1.5"/>
  <text x="90" y="220" font-size="11" font-weight="700" letter-spacing="1.2" fill="#2c6b8f">2 &#183; CLEAN &amp; QUALITY-CONTROL</text>
  <text x="90" y="239" font-size="11.5" font-family="'SF Mono', Menlo, Consolas, monospace" fill="#2b3d49">filterDeploymentData()  -&gt;  regularizeTimeSeries()</text>
  <text x="90" y="256" font-size="11.5" font-family="'SF Mono', Menlo, Consolas, monospace" fill="#2b3d49">checkSensorIntegrity() / checkSensorQuality()  -&gt;  filterLocations()</text>
  <line x1="450" y1="262" x2="450" y2="278" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- spine band 3 -->
  <rect x="70" y="280" width="760" height="60" rx="8" fill="#ffffff" stroke="#9db8c9" stroke-width="1.5"/>
  <text x="90" y="303" font-size="11" font-weight="700" letter-spacing="1.2" fill="#2c6b8f">3 &#183; ORIENT &amp; CALIBRATE</text>
  <text x="90" y="325" font-size="11.5" font-family="'SF Mono', Menlo, Consolas, monospace" fill="#2b3d49">checkTagMapping()  -&gt;  consensusAxisMapping()  -&gt;  applyAxisMapping()  -&gt;  calibrateMagnetometer()</text>
  <line x1="450" y1="340" x2="450" y2="360" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- pivot -->
  <rect x="330" y="362" width="240" height="54" rx="10" fill="#0f6b73" stroke="#0a4f56" stroke-width="1.5"/>
  <text x="450" y="395" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" font-family="'SF Mono', Menlo, Consolas, monospace">processTagData()</text>
  <text x="586" y="384" font-size="11" fill="#0f6b73" font-weight="700">analysis-ready</text>
  <text x="586" y="399" font-size="11" fill="#0f6b73" font-family="'SF Mono', Menlo, Consolas, monospace">nautilus_tag</text>
  <line x1="314" y1="389" x2="576" y2="389" stroke="#0f6b73" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="450" y1="416" x2="450" y2="440" stroke="#5a7c93" stroke-width="2"/>

  <!-- distributor + 4 optional branches -->
  <line x1="127" y1="440" x2="773" y2="440" stroke="#5a7c93" stroke-width="2"/>
  <text x="450" y="434" text-anchor="middle" font-size="10.5" fill="#6b7d88" font-style="italic">optional branches &#8212; choose by your goal</text>

  <!-- branch boxes: x = 30, 245, 460, 675 ; w = 195 ; centres 127.5, 342.5, 557.5, 772.5 -->
  <line x1="127" y1="440" x2="127" y2="462" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="342" y1="440" x2="342" y2="462" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="557" y1="440" x2="557" y2="462" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="772" y1="440" x2="772" y2="462" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>

  <g font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">
    <!-- Summaries -->
    <rect x="30" y="464" width="195" height="150" rx="8" fill="#eef5f2" stroke="#86a89f" stroke-width="1.5"/>
    <text x="47" y="488" font-size="12" font-weight="700" fill="#2f6f63" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">Summaries &amp; figures</text>
    <text x="47" y="513" fill="#3a4a52">summarizeTagData()</text>
    <text x="47" y="531" fill="#3a4a52">plotDepthProfiles()</text>
    <text x="47" y="549" fill="#3a4a52">plotTimeAtDepth()</text>
    <text x="47" y="567" fill="#3a4a52">plotDistributions()</text>

    <!-- Behaviour -->
    <rect x="245" y="464" width="195" height="150" rx="8" fill="#eef5f2" stroke="#86a89f" stroke-width="1.5"/>
    <text x="262" y="488" font-size="12" font-weight="700" fill="#2f6f63" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">Behaviour &amp; kinematics</text>
    <text x="262" y="513" fill="#3a4a52">calculateTailBeats()</text>
    <text x="262" y="531" fill="#3a4a52">extractFeatures()</text>
    <text x="262" y="549" fill="#3a4a52">getDielPhase()</text>

    <!-- Tracks -->
    <rect x="460" y="464" width="195" height="150" rx="8" fill="#eef5f2" stroke="#86a89f" stroke-width="1.5"/>
    <text x="477" y="488" font-size="12" font-weight="700" fill="#2f6f63" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">Movement tracks</text>
    <text x="477" y="515" fill="#3a4a52">reconstructTrack()</text>
    <text x="477" y="535" fill="#3a4a52">crossValidateTrack()</text>
    <text x="477" y="555" fill="#3a4a52">trackMetrics()  /  plotTracks()</text>
    <text x="477" y="575" fill="#3a4a52">exportForSSM()</text>

    <!-- Video -->
    <rect x="675" y="464" width="195" height="150" rx="8" fill="#eef5f2" stroke="#86a89f" stroke-width="1.5"/>
    <text x="692" y="488" font-size="12" font-weight="700" fill="#2f6f63" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">Onboard video</text>
    <text x="692" y="513" fill="#3a4a52">getVideoMetadata()</text>
    <text x="692" y="531" fill="#3a4a52">annotateData()</text>
    <text x="692" y="549" fill="#3a4a52">filterVideoPeriod()</text>
    <text x="692" y="567" fill="#3a4a52">renderOverlayVideo()</text>
  </g>

  <text x="450" y="640" text-anchor="middle" font-size="10.5" fill="#8a9aa5">Solid path: run for every deployment.   Every stage annotates one self-describing nautilus_tag object.</text>
</svg>
