<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 706" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5a7c93"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="984" height="690" rx="14" fill="#f6f9fb" stroke="#d7e2ea" stroke-width="1.5"/>
  <text x="500" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#1f3a4a">The nautilus workflow</text>

  <!-- input -->
  <rect x="300" y="50" width="400" height="52" rx="9" fill="#dbe7f0" stroke="#7d9bb2" stroke-width="1.5"/>
  <text x="500" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#22333f">Raw tag data</text>
  <text x="500" y="90" text-anchor="middle" font-size="11" fill="#4a5c68">sensor CSVs  &#183;  deployment metadata  &#183;  (camera video)</text>
  <line x1="500" y1="102" x2="500" y2="122" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- spine band 1 -->
  <rect x="70" y="124" width="860" height="60" rx="8" fill="#ffffff" stroke="#9db8c9" stroke-width="1.5"/>
  <text x="90" y="147" font-size="11" font-weight="700" letter-spacing="1.2" fill="#2c6b8f">1 &#183; PREPARE &amp; IMPORT</text>
  <text x="90" y="169" font-size="11.5" font-family="'SF Mono', Menlo, Consolas, monospace" fill="#2b3d49">checkDeploymentMetadata()  -&gt;  importTagData()</text>
  <text x="912" y="147" text-anchor="end" font-size="10.5" font-style="italic" fill="#6b7d88">check the deployment sheet, then read</text>
  <text x="912" y="163" text-anchor="end" font-size="10.5" font-style="italic" fill="#6b7d88">sensors, video and co-deployed tags</text>
  <line x1="500" y1="184" x2="500" y2="200" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- spine band 2 -->
  <rect x="70" y="202" width="860" height="60" rx="8" fill="#ffffff" stroke="#9db8c9" stroke-width="1.5"/>
  <text x="90" y="220" font-size="11" font-weight="700" letter-spacing="1.2" fill="#2c6b8f">2 &#183; CLEAN &amp; QUALITY-CONTROL</text>
  <text x="90" y="239" font-size="11.5" font-family="'SF Mono', Menlo, Consolas, monospace" fill="#2b3d49">filterDeploymentData()  -&gt;  regularizeTimeSeries()</text>
  <text x="90" y="256" font-size="11.5" font-family="'SF Mono', Menlo, Consolas, monospace" fill="#2b3d49">checkSensorIntegrity() / checkSensorQuality()  -&gt;  filterLocations()</text>
  <text x="912" y="223" text-anchor="end" font-size="10.5" font-style="italic" fill="#6b7d88">trim to time on animal, put samples on</text>
  <text x="912" y="239" text-anchor="end" font-size="10.5" font-style="italic" fill="#6b7d88">a regular clock, screen each channel</text>
  <text x="912" y="255" text-anchor="end" font-size="10.5" font-style="italic" fill="#6b7d88">for faults</text>
  <line x1="500" y1="262" x2="500" y2="278" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- spine band 3 -->
  <rect x="70" y="280" width="860" height="60" rx="8" fill="#ffffff" stroke="#9db8c9" stroke-width="1.5"/>
  <text x="90" y="303" font-size="11" font-weight="700" letter-spacing="1.2" fill="#2c6b8f">3 &#183; ORIENT &amp; CALIBRATE</text>
  <text x="90" y="325" font-size="11.5" font-family="'SF Mono', Menlo, Consolas, monospace" fill="#2b3d49">checkTagMapping()  -&gt;  consensusAxisMapping()  -&gt;  applyAxisMapping()  -&gt;  calibrateMagnetometer()</text>
  <text x="912" y="299" text-anchor="end" font-size="10.5" font-style="italic" fill="#6b7d88">work out how the tag sat on the</text>
  <text x="912" y="315" text-anchor="end" font-size="10.5" font-style="italic" fill="#6b7d88">animal; correct the magnetometer</text>
  <line x1="500" y1="340" x2="500" y2="360" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- pivot -->
  <rect x="380" y="362" width="240" height="54" rx="10" fill="#0f6b73" stroke="#0a4f56" stroke-width="1.5"/>
  <text x="500" y="395" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" font-family="'SF Mono', Menlo, Consolas, monospace">processTagData()</text>
  <text x="636" y="384" font-size="11" fill="#0f6b73" font-weight="700">analysis-ready</text>
  <text x="636" y="399" font-size="11" fill="#0f6b73" font-family="'SF Mono', Menlo, Consolas, monospace">nautilus_tag</text>
  <text x="364" y="384" text-anchor="end" font-size="10.5" font-style="italic" fill="#6b7d88">orientation, kinematics,</text>
  <text x="364" y="399" text-anchor="end" font-size="10.5" font-style="italic" fill="#6b7d88">body acceleration, speed</text>
  <line x1="500" y1="416" x2="500" y2="440" stroke="#5a7c93" stroke-width="2"/>

  <!-- distributor + 5 optional branches -->
  <line x1="116" y1="440" x2="884" y2="440" stroke="#5a7c93" stroke-width="2"/>
  <rect x="368" y="423" width="264" height="14" fill="#f6f9fb"/>
  <text x="500" y="433" text-anchor="middle" font-size="10.5" fill="#6b7d88" font-style="italic">optional branches &#8212; choose by your question</text>

  <!-- branch boxes: x = 28, 220, 412, 604, 796 ; w = 176 ; centres 116, 308, 500, 692, 884 -->
  <line x1="116" y1="440" x2="116" y2="462" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="308" y1="440" x2="308" y2="462" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="440" x2="500" y2="462" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="692" y1="440" x2="692" y2="462" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="884" y1="440" x2="884" y2="462" stroke="#5a7c93" stroke-width="2" marker-end="url(#arrow)"/>

  <g font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9.5">
    <!-- Summaries -->
    <rect x="28" y="464" width="176" height="166" rx="8" fill="#eef5f2" stroke="#86a89f" stroke-width="1.5"/>
    <text x="42" y="486" font-size="11.5" font-weight="700" fill="#2f6f63" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">Summaries &amp; figures</text>
    <text x="42" y="501" font-size="9.5" font-style="italic" fill="#7b8f99" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">per-deployment overviews</text>
    <text x="42" y="524" fill="#3a4a52">summarizeTagData()</text>
    <text x="42" y="542" fill="#3a4a52">plotDepthProfiles()</text>
    <text x="42" y="560" fill="#3a4a52">plotTimeAtDepth()</text>
    <text x="42" y="578" fill="#3a4a52">plotDistributions()</text>

    <!-- Dive analysis -->
    <rect x="220" y="464" width="176" height="166" rx="8" fill="#eef5f2" stroke="#86a89f" stroke-width="1.5"/>
    <text x="234" y="486" font-size="11.5" font-weight="700" fill="#2f6f63" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">Dive analysis</text>
    <text x="234" y="501" font-size="9.5" font-style="italic" fill="#7b8f99" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">one row per dive</text>
    <text x="234" y="524" fill="#3a4a52">diveControl()</text>
    <text x="234" y="542" fill="#3a4a52">detectDives()</text>
    <text x="234" y="560" fill="#3a4a52">diveMetrics()</text>
    <text x="234" y="578" fill="#3a4a52">plotDives()</text>

    <!-- Behaviour -->
    <rect x="412" y="464" width="176" height="166" rx="8" fill="#eef5f2" stroke="#86a89f" stroke-width="1.5"/>
    <text x="426" y="486" font-size="11.5" font-weight="700" fill="#2f6f63" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">Behaviour &amp; kinematics</text>
    <text x="426" y="501" font-size="9.5" font-style="italic" fill="#7b8f99" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">swimming effort, ML features</text>
    <text x="426" y="524" fill="#3a4a52">calculateTailBeats()</text>
    <text x="426" y="542" fill="#3a4a52">extractFeatures()</text>
    <text x="426" y="560" fill="#3a4a52">getDielPhase()</text>

    <!-- Tracks -->
    <rect x="604" y="464" width="176" height="166" rx="8" fill="#eef5f2" stroke="#86a89f" stroke-width="1.5"/>
    <text x="618" y="486" font-size="11.5" font-weight="700" fill="#2f6f63" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">Movement tracks</text>
    <text x="618" y="501" font-size="9.5" font-style="italic" fill="#7b8f99" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">dead-reckon and validate</text>
    <text x="618" y="524" fill="#3a4a52">reconstructTrack()</text>
    <text x="618" y="542" fill="#3a4a52">crossValidateTrack()</text>
    <text x="618" y="560" fill="#3a4a52">trackMetrics()</text>
    <text x="618" y="578" fill="#3a4a52">plotTracks()</text>
    <text x="618" y="596" fill="#3a4a52">exportForSSM()</text>

    <!-- Video -->
    <rect x="796" y="464" width="176" height="166" rx="8" fill="#eef5f2" stroke="#86a89f" stroke-width="1.5"/>
    <text x="810" y="486" font-size="11.5" font-weight="700" fill="#2f6f63" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">Onboard video</text>
    <text x="810" y="501" font-size="9.5" font-style="italic" fill="#7b8f99" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">align footage to sensors</text>
    <text x="810" y="524" fill="#3a4a52">getVideoMetadata()</text>
    <text x="810" y="542" fill="#3a4a52">annotateData()</text>
    <text x="810" y="560" fill="#3a4a52">filterVideoPeriod()</text>
    <text x="810" y="578" fill="#3a4a52">renderOverlayVideo()</text>
  </g>

  <text x="500" y="660" text-anchor="middle" font-size="10.5" fill="#8a9aa5">Solid path: run for every deployment.   Every stage annotates one self-describing nautilus_tag object.</text>
  <text x="500" y="678" text-anchor="middle" font-size="10" fill="#a3b1ba" font-style="italic">Branches are independent &#8212; run only what your question needs.</text>
</svg>
